repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, pandas-stubs, types-tqdm]
  - repo: local
    hooks:
      - id: update-data-dict
        name: Update Data Dictionary
        entry: bash -c "export PYTHONPATH=$PYTHONPATH:. && .venv/bin/python scripts/update_data_dict.py"
        language: system
        pass_filenames: false
        always_run: true
