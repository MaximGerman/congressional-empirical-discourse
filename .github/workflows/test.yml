name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v --cov=src --cov=scripts --cov-report=term-missing
