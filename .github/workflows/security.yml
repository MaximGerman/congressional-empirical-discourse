name: Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies and pip-audit
        run: |
          pip install pip-audit
          pip install -r requirements.txt

      - name: Audit dependencies
        run: pip-audit
